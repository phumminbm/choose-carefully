<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ไปเดทกัน? 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent-pink: #ff6b9d;
    --accent-lilac: #c77dff;
    --accent-peach: #ffb347;
    --accent-rose: #ff4d6d;
    --card-bg: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.15);
    --text: #fff5f9;
    --subtext: rgba(255,245,249,0.65);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 20%, #2d1b4e 0%, #0d0816 40%),
                radial-gradient(ellipse at 80% 80%, #1a0a2e 0%, #0d0816 40%);
    background-color: #0d0816;
    font-family: 'Mitr', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Stars */
  .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.8; transform: scale(1.2); }
  }

  /* Floating hearts */
  .heart-float {
    position: fixed; pointer-events: none; z-index: 0;
    font-size: 1.4rem;
    animation: floatUp 6s ease-in forwards; opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0.9; }
    100% { transform: translateY(-100vh) rotate(20deg); opacity: 0; }
  }

  /* Main wrapper */
  #app {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    padding: 2rem 1.5rem;
    text-align: center;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Steps */
  .step { display: none; width: 100%; animation: fadeSlide 0.5s ease; }
  .step.active { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Dog image */
  .dog-wrap {
    position: relative;
    width: 180px; height: 180px;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 8px 24px rgba(255,100,150,0.4));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%       { transform: translateY(-12px) rotate(2deg); }
  }
  .dog-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }

  /* Day selection dog */
  .day-dog-img {
    width: 160px; height: 160px;
    border-radius: 50%; object-fit: cover; object-position: center top;
    border: 4px solid rgba(255,107,157,0.6);
    box-shadow: 0 0 30px rgba(255,107,157,0.5), 0 0 60px rgba(199,125,255,0.3);
    animation: dogPop 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  /* Emoji decoration */
  .top-emoji {
    font-size: 4rem; line-height: 1;
    filter: drop-shadow(0 0 16px rgba(255,255,255,0.4));
    animation: bounce 2s ease-in-out infinite;
  }

  h1 {
    font-size: 2rem; font-weight: 600;
    background: linear-gradient(135deg, #ff6b9d, #c77dff, #ffb347);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.35; letter-spacing: 0.02em;
  }
  h2 {
    font-size: 1.45rem; font-weight: 500;
    color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    letter-spacing: 0.03em;
  }

  .msg {
    font-size: 1.05rem; color: var(--accent-pink);
    font-weight: 400; min-height: 1.6em;
    transition: all 0.3s ease;
    text-shadow: 0 0 20px rgba(255,107,157,0.4);
  }

  /* Buttons */
  .btn-row { display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 0.3rem; }

  .btn-yes {
    padding: 0.9rem 2.2rem;
    font-family: 'Mitr', sans-serif; font-size: 1.15rem; font-weight: 600;
    background: linear-gradient(135deg, #ff3c7d, #ff8c00);
    border: none; border-radius: 50px; color: white; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 20px rgba(255,60,125,0.5), 0 0 0 3px rgba(255,255,255,0.3);
    position: relative; overflow: hidden;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .btn-yes::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.2); opacity:0; transition:opacity 0.2s; }
  .btn-yes:hover::before { opacity:1; }
  .btn-yes:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(255,60,125,0.7); }
  .btn-yes:active { transform: scale(0.97); }

  .btn-no {
    padding: 0.9rem 2rem;
    font-family: 'Mitr', sans-serif; font-size: 1rem; font-weight: 400;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50px; color: rgba(255,255,255,0.75);
    cursor: pointer; transition: all 0.3s ease;
    transform-origin: center; backdrop-filter: blur(4px);
  }
  .btn-no:hover { background: rgba(255,255,255,0.22); color: white; }
  .btn-no:active { transform: scale(0.95); }
  .btn-no.hidden { display: none !important; }

  /* Style cards */
  .style-cards { display: flex; flex-direction: column; gap: 1rem; width: 100%; }
  .style-card {
    padding: 1.4rem 1.6rem;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 18px; cursor: pointer; text-align: left;
    transition: all 0.25s ease; backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: 1rem;
  }
  .style-card:hover, .style-card:active {
    background: rgba(255,255,255,0.32);
    border-color: rgba(255,255,255,0.6);
    transform: scale(1.02);
    box-shadow: 0 4px 24px rgba(255,100,150,0.3);
  }
  .style-card .card-emoji { font-size: 2.2rem; flex-shrink: 0; }
  .style-card .card-info .card-title { font-size: 1.05rem; font-weight: 600; color: #fff; margin-bottom: 0.2rem; }
  .style-card .card-info .card-desc { font-size: 0.85rem; color: rgba(255,255,255,0.75); font-weight: 300; }

  /* Venue cards */
  .venue-cards { display: flex; flex-direction: column; gap: 1.2rem; width: 100%; }
  .venue-card {
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 20px; overflow: hidden; cursor: pointer;
    transition: all 0.25s ease; backdrop-filter: blur(10px); text-align: left;
  }
  .venue-card:hover, .venue-card:active {
    border-color: rgba(255,255,255,0.55);
    transform: scale(1.02);
    box-shadow: 0 8px 32px rgba(255,100,150,0.3);
  }
  .venue-img-banner {
    width: 100%; height: 150px; position: relative;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .venue-banner-emoji { font-size: 4rem; position: relative; z-index: 2; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
  .venue-banner-glow { position: absolute; width: 120px; height: 120px; border-radius: 50%; opacity: 0.2; filter: blur(30px); z-index: 1; }
  .venue-body { padding: 1rem 1.2rem 1.2rem; }
  .venue-name { font-size: 1.05rem; font-weight: 600; color: #fff; margin-bottom: 0.35rem; }
  .venue-desc { font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.5; font-weight: 300; }
  .venue-tag {
    display: inline-block; margin-top: 0.6rem;
    padding: 0.2rem 0.7rem; border-radius: 20px;
    font-size: 0.75rem; font-weight: 500;
    background: rgba(255,255,255,0.2); color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
  }

  /* Final */
  .final-icon {
    width: 200px; height: 200px;
    border-radius: 50%; object-fit: cover; object-position: center top;
    border: 4px solid rgba(255,107,157,0.6);
    box-shadow: 0 0 30px rgba(255,107,157,0.5), 0 0 60px rgba(199,125,255,0.3);
    animation: dogPop 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }
  @keyframes dogPop {
    0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(3deg); opacity: 1; }
    80%  { transform: scale(0.95) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .final-place { font-size: 1.6rem; font-weight: 600; color: #fff; text-shadow: 0 2px 16px rgba(255,60,125,0.5); }
  .final-date  { font-size: 1rem; color: rgba(255,255,255,0.8); font-weight: 300; }

  .confetti-bar {
    width: 100%; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, #ff6b9d, #ffb347, #fff, #ff6b9d);
    background-size: 200%;
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer { 0% { background-position:0%; } 100% { background-position:200%; } }

  .back-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
    font-family: 'Mitr', sans-serif; font-size: 0.85rem; cursor: pointer;
    display: flex; align-items: center; gap: 0.3rem;
    padding: 0.4rem 1rem; border-radius: 20px;
    transition: all 0.2s; margin-top: -0.5rem; backdrop-filter: blur(4px);
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); color: white; }

  .rating { font-size: 0.75rem; color: #ffe066; margin-top: 0.3rem; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,60,125,0.6), 0 0 0 3px rgba(255,255,255,0.3); }
    70%  { box-shadow: 0 0 0 15px rgba(255,60,125,0), 0 0 0 3px rgba(255,255,255,0.3); }
    100% { box-shadow: 0 0 0 0 rgba(255,60,125,0), 0 0 0 3px rgba(255,255,255,0.3); }
  }
  .btn-yes.pulse { animation: pulse-ring 1.5s ease-out infinite; }

  @media (max-width: 400px) {
    h1 { font-size: 1.7rem; }
    #app { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div id="app">

  <!-- STEP 1 — ถามว่าไปมั้ย -->
  <div class="step active" id="step1">
    <div class="dog-wrap">
      <img id="dog-img" src="YOUR_MAIN_DOG_IMAGE_URL_HERE" alt="น้องหมา 🐾"/>
    </div>
    <h1>ไปเดทกับช้านมั้ยไอหนู?</h1>
    <p class="msg" id="no-msg">&nbsp;</p>
    <div class="btn-row">
      <button class="btn-yes pulse" id="btn-yes" onclick="handleYes()">ไป 💚</button>
      <button class="btn-no" id="btn-no" onclick="handleNo()">ไม่ไป 💔</button>
    </div>
  </div>

  <!-- STEP 2 — เลือก Vibe -->
  <div class="step" id="step2">
    <button class="back-btn" onclick="goBack(1)">← กลับ</button>
    <div class="top-emoji">🥂</div>
    <h2>อยากไปฟิลประมาณไหน</h2>
    <div class="style-cards">
      <div class="style-card" onclick="selectStyle('outdoor')">
        <div class="card-emoji">🌿</div>
        <div class="card-info">
          <div class="card-title">Outdoor Vibes</div>
          <div class="card-desc">ชิล ๆ ดื่มเบา ๆ อากาศดี ๆ</div>
        </div>
      </div>
      <div class="style-card" onclick="selectStyle('indoor')">
        <div class="card-emoji">❄️</div>
        <div class="card-info">
          <div class="card-title">Indoor Chill</div>
          <div class="card-desc">บาร์ แอร์เย็น บรรยากาศดี</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 3 — เลือกสถานที่ -->
  <div class="step" id="step3">
    <button class="back-btn" onclick="goBack(2)">← กลับ</button>
    <h2 id="venue-title">เลือกสถานที่ 📍</h2>
    <div class="venue-cards" id="venue-list"></div>
  </div>

  <!-- STEP 4 — เลือกวัน -->
  <div class="step" id="step4">
    <button class="back-btn" onclick="goBack(3)">← กลับ</button>
    <img class="day-dog-img" src="YOUR_QUESTION_DOG_IMAGE_URL_HERE" alt="🐾"/>
    <h2>แล้วจะไปวันไหนดี?</h2>
    <div class="style-cards">
      <div class="style-card" onclick="selectDay('ศุกร์ที่ 10 นี้ 🎉')">
        <div class="card-emoji">📅</div>
        <div class="card-info">
          <div class="card-title">ศุกร์ที่ 10 นี้</div>
          <div class="card-desc">เร็วๆ นี้เลย ไม่รอแล้ว!</div>
        </div>
      </div>
      <div class="style-card" onclick="selectDay('เสาร์ที่ 11 นี้ 🌟')">
        <div class="card-emoji">📅</div>
        <div class="card-info">
          <div class="card-title">เสาร์ที่ 11 นี้</div>
          <div class="card-desc">วันหยุด ชิลได้เต็มที่!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 5 — สรุปผล -->
  <div class="step" id="step5">
    <div class="confetti-bar"></div>
    <img class="final-icon" id="final-dog-img" src="YOUR_MAIN_DOG_IMAGE_URL_HERE" alt="🐾"/>
    <h2>ดีล! ไปกัน!</h2>
    <p class="final-place" id="final-place-name">—</p>
    <p class="final-date" id="final-day-text">—</p>
    <p style="font-size:0.9rem; color:rgba(255,255,255,0.75); margin-top:0.5rem;">อย่าลืมล่ะ 💌</p>
    <div class="confetti-bar"></div>
  </div>

</div>

<script>
// ============================================================
// 🖼️ ใส่ URL รูปภาพตรงนี้
// ============================================================
const IMG_MAIN_DOG   = 'YOUR_MAIN_DOG_IMAGE_URL_HERE';   // รูปหมาหลัก (Step 1 + Step 5)
const IMG_POUT_DOG   = 'YOUR_POUT_DOG_IMAGE_URL_HERE';   // รูปหมางอน (กด "ไม่ไป")
const IMG_QUESTION_DOG = 'YOUR_QUESTION_DOG_IMAGE_URL_HERE'; // รูปหมา "?" (Step 4)

// ---- Set images ----
document.getElementById('dog-img').src     = IMG_MAIN_DOG;
document.getElementById('final-dog-img').src = IMG_MAIN_DOG;
document.querySelectorAll('.day-dog-img').forEach(el => el.src = IMG_QUESTION_DOG);

// ============================================================
// Stars
// ============================================================
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    c.appendChild(s);
  }
})();

// ============================================================
// State
// ============================================================
let noCount  = 0;
let yesScale = 1;

const noMsgs = [
  "แน่ใจหรอ 🥺",
  "คิดดีแล้วนะ 😢",
  "ลองอีกทีน้า 💔",
  "หื้ออ อีกสักที 😭",
  "ไปเถอะนะ 💕",
];

// ============================================================
// Floating hearts
// ============================================================
function spawnHeart(x, y) {
  const emojis = ['💕','💖','🩷','💗','💓','✨','🐾','🌸'];
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  h.style.left = (x + (Math.random()-0.5)*50) + 'px';
  h.style.top  = y + 'px';
  h.style.animationDuration = (Math.random()*2+4) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6500);
}

// ============================================================
// Handlers
// ============================================================
function handleNo() {
  noCount++;
  const btn   = document.getElementById('btn-no');
  const msgEl = document.getElementById('no-msg');
  const dogImg = document.getElementById('dog-img');

  // เปลี่ยนรูปเป็นรูปงอน
  dogImg.src = IMG_POUT_DOG;

  msgEl.textContent = noMsgs[Math.min(noCount - 1, noMsgs.length - 1)];

  yesScale = Math.min(1 + noCount * 0.25, 2.8);
  document.getElementById('btn-yes').style.transform = `scale(${yesScale})`;

  const noScale = Math.max(1 - noCount * 0.08, 0.5);
  btn.style.transform = `scale(${noScale})`;
  btn.style.opacity   = Math.max(1 - noCount * 0.15, 0.15);

  if (noCount >= 5) {
    btn.classList.add('hidden');
    msgEl.textContent = "โอเค ถือว่าไปละนะ 😆";
    setTimeout(() => { msgEl.textContent = "ไปเลย กด YES ได้เลย! 💕"; }, 1800);
  }
}

function handleYes() {
  // คืนรูปหลัก (ถ้าเคยเปลี่ยนเป็นรูปงอน)
  document.getElementById('dog-img').src = IMG_MAIN_DOG;

  const btn = document.getElementById('btn-yes');
  const r   = btn.getBoundingClientRect();
  for (let i = 0; i < 10; i++) {
    setTimeout(() => spawnHeart(r.left + r.width/2, r.top), i * 80);
  }
  setTimeout(() => showStep(2), 400);
}

function selectStyle(type) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => spawnHeart(Math.random()*window.innerWidth, window.innerHeight*0.5), i*100);
  }
  renderVenues(type);
  showStep(3);
}

function selectVenue(name) {
  document.getElementById('final-place-name').textContent = name;
  for (let i = 0; i < 10; i++) {
    setTimeout(() => spawnHeart(Math.random()*window.innerWidth, window.innerHeight*0.6), i*60);
  }
  showStep(4);
}

function selectDay(day) {
  document.getElementById('final-day-text').textContent = day + ' นะ 😉';
  for (let i = 0; i < 18; i++) {
    setTimeout(() => spawnHeart(Math.random()*window.innerWidth, window.innerHeight*0.6), i*55);
  }
  showStep(5);
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}

function goBack(n) { showStep(n); }

// ============================================================
// Venue data
// ============================================================
const venues = {
  outdoor: [
    {
      name: "บ้านเพื่อน เอกมัย",
      desc: "บาร์ outdoor ชั้นดาดฟ้า บรรยากาศบ้าน ๆ อบอุ่น มีดนตรีสดไทย-สากล เหมาะนั่งเม้าท์กับแก๊ง",
      emoji: "🏡", tag: "Chill Outdoor · Ekamai", rating: "★★★★☆ 4.4",
      gradient: "linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 40%, #1e4030 100%)",
      accentColor: "#4ade80"
    },
    {
      name: "Laylow",
      desc: "บาร์วินเทจสีสันสดใส บรรยากาศผ่อนคลาย ดริงค์อร่อย ฟีลชิล ๆ แต่สนุก เอกมัย 24",
      emoji: "🎨", tag: "Vintage Chill · Ekamai 24", rating: "★★★★★ 4.9",
      gradient: "linear-gradient(135deg, #3d1a00 0%, #7a3b0a 40%, #5c2d08 100%)",
      accentColor: "#fb923c"
    }
  ],
  indoor: [
    {
      name: "TUBA เอกมัย",
      desc: "บาร์ร้านอาหาร vintage คลาสสิก มีดนตรีสดทุกคืน เมนูดริงค์เยอะ นั่งสบาย คุยกันสนุก",
      emoji: "🎷", tag: "Live Music · Ekamai", rating: "★★★★★ 4.7",
      gradient: "linear-gradient(135deg, #1a0a2e 0%, #3d1f6b 40%, #2a1550 100%)",
      accentColor: "#a78bfa"
    },
    {
      name: "Rabbit Hole",
      desc: "Speakeasy cocktail bar สไตล์ลับ ๆ เข้าทางประตูไม้ cocktail สร้างสรรค์ unique มาก",
      emoji: "🐇", tag: "Speakeasy · Cocktail Bar", rating: "★★★★★ 4.5",
      gradient: "linear-gradient(135deg, #1a0d00 0%, #3d2000 40%, #2a1500 100%)",
      accentColor: "#fbbf24"
    }
  ]
};

function renderVenues(type) {
  const titles = {
    outdoor: "🌿 Outdoor ชิล ๆ — เลือกที่ 📍",
    indoor:  "❄️ Indoor บาร์เย็น — เลือกที่ 📍"
  };
  document.getElementById('venue-title').textContent = titles[type];
  const list = document.getElementById('venue-list');
  list.innerHTML = '';
  venues[type].forEach(v => {
    const card = document.createElement('div');
    card.className = 'venue-card';
    card.onclick = () => selectVenue(v.name);
    card.innerHTML = `
      <div class="venue-img-banner" style="background:${v.gradient}">
        <span class="venue-banner-emoji">${v.emoji}</span>
        <div class="venue-banner-glow" style="background:${v.accentColor}"></div>
      </div>
      <div class="venue-body">
        <div class="venue-name">${v.name}</div>
        <div class="venue-desc">${v.desc}</div>
        <div class="rating">${v.rating}</div>
        <span class="venue-tag" style="background:${v.accentColor}22; color:${v.accentColor}; border-color:${v.accentColor}44">${v.tag}</span>
      </div>`;
    list.appendChild(card);
  });
}
</script>
</body>
</html>
